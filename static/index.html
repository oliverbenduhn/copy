<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>COPY</title>
  <meta name="theme-color" content="#d97706" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="icon" href="/icons/icon-192.png" type="image/png" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      color-scheme: light;
      --bg: #fafaf8; --surface: #ffffff; --surface-alt: #f3f3f0;
      --border: #e0ddd8; --border-sub: #edeae5;
      --text: #1a1a18; --text-muted: #7a7772;
      --accent: #d97706; --accent-hov: #b45309; --accent-soft: #fef3c7;
      --danger: #dc2626; --danger-soft: #fef2f2; --success: #16a34a;
      --r: 6px; --sidebar-w: 280px; --topbar-h: 48px;
      --font: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', ui-monospace, monospace;
    }
    [data-theme="dark"] {
      color-scheme: dark;
      --bg: #0f0f0f; --surface: #161616; --surface-alt: #1e1e1e;
      --border: #2a2a2a; --border-sub: #222222;
      --text: #e4e4dc; --text-muted: #6a6a62;
      --accent: #f59e0b; --accent-hov: #fbbf24; --accent-soft: #1c1507;
      --danger: #f87171; --danger-soft: #1f0a0a; --success: #4ade80;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font); font-size: 14px; line-height: 1.6;
      background: var(--bg); color: var(--text);
      -webkit-font-smoothing: antialiased;
      transition: background-color 0.2s ease, color 0.2s ease;
      min-height: 100dvh; display: flex; flex-direction: column;
    }
    button, input { font: inherit; color: inherit; }

    /* Topbar */
    #topbar {
      position: sticky; top: 0; z-index: 100; height: var(--topbar-h);
      background: var(--surface); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 0.75rem; padding: 0 1rem; flex-shrink: 0;
    }
    #topbar-brand { font-size: 0.9rem; font-weight: 600; letter-spacing: 0.2em; flex-shrink: 0; display: none; }
    #search-wrap { flex: 1; position: relative; max-width: 360px; }
    #search-wrap .si {
      position: absolute; left: 0.55rem; top: 50%; transform: translateY(-50%);
      color: var(--text-muted); pointer-events: none; display: flex; align-items: center;
    }
    #search-input {
      width: 100%; background: var(--surface-alt); border: 1px solid var(--border);
      border-radius: var(--r); padding: 0.3rem 1.8rem 0.3rem 1.85rem;
      font-size: 0.82rem; color: var(--text); outline: none; transition: border-color 0.15s;
    }
    #search-input:focus { border-color: var(--accent); }
    #search-input::placeholder { color: var(--text-muted); }
    #search-clear {
      position: absolute; right: 0.4rem; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; color: var(--text-muted);
      display: none; align-items: center; justify-content: center; padding: 2px; border-radius: 3px;
    }
    #search-clear:hover { color: var(--text); }
    #search-clear.vis { display: flex; }
    #topbar-tools { display: flex; align-items: center; gap: 0.2rem; flex-shrink: 0; }
    .vsep { width: 1px; height: 18px; background: var(--border); margin: 0 0.15rem; }
    .ib {
      background: none; border: none; cursor: pointer; color: var(--text-muted);
      border-radius: var(--r); display: inline-flex; align-items: center; justify-content: center;
      transition: background 0.1s, color 0.1s; width: 30px; height: 30px;
    }
    .ib:hover { background: var(--surface-alt); color: var(--text); }
    .ib:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
    .ib.on { background: var(--accent-soft); color: var(--accent); }

    /* Layout */
    #app-layout { display: flex; flex: 1; min-height: 0; }

    /* Sidebar */
    #sidebar {
      width: var(--sidebar-w); flex-shrink: 0;
      border-right: 1px solid var(--border); background: var(--surface);
      position: sticky; top: var(--topbar-h); height: calc(100dvh - var(--topbar-h));
      overflow-y: auto; display: flex; flex-direction: column;
    }
    #sidebar-inner {
      display: flex; flex-direction: column; flex: 1;
      padding: 1.1rem 0.9rem; gap: 1.1rem;
    }
    #sidebar-brand { font-size: 1rem; font-weight: 600; letter-spacing: 0.25em; padding-bottom: 0.1rem; }

    /* Drop Zone */
    #drop-zone {
      border: 2px dashed var(--border); border-radius: var(--r);
      padding: 1.35rem 0.75rem; display: flex; flex-direction: column;
      align-items: center; gap: 0.45rem; cursor: pointer; text-align: center;
      background: var(--surface-alt); transition: border-color 0.15s, background 0.15s;
    }
    #drop-zone:hover, #drop-zone.dragover { border-color: var(--accent); background: var(--accent-soft); }
    #drop-zone:hover .dz-ic, #drop-zone.dragover .dz-ic { color: var(--accent); }
    .dz-ic { color: var(--text-muted); transition: color 0.15s; }
    .dz-t { font-size: 0.82rem; font-weight: 500; }
    .dz-s { font-size: 0.72rem; color: var(--text-muted); }

    /* Progress */
    #progress-container { display: none; flex-direction: column; gap: 0.45rem; }
    .pi {
      border: 1px solid var(--border); border-radius: var(--r);
      padding: 0.45rem 0.55rem; background: var(--surface-alt);
      display: flex; flex-direction: column; gap: 0.3rem;
    }
    .pi-row { display: flex; justify-content: space-between; align-items: center; }
    .pi-name { font-size: 0.72rem; color: var(--text-muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; min-width: 0; }
    .pb { height: 3px; border-radius: 999px; background: var(--border); overflow: hidden; }
    .pb-f { height: 100%; background: var(--accent); width: 0%; transition: width 0.2s ease; }
    .pb--ind .pb-f { animation: pb-slide 1.2s ease-in-out infinite; width: 40%; }
    @keyframes pb-slide { 0% { transform: translateX(-120%); } 100% { transform: translateX(300%); } }

    /* Upload warning */
    #upload-warning {
      display: none; padding: 0.4rem 0.55rem; border-radius: var(--r);
      background: #fefce8; border: 1px solid #fde68a; font-size: 0.72rem; color: #92400e;
    }
    [data-theme="dark"] #upload-warning { background: #1c1507; border-color: #78350f; color: #fcd34d; }

    /* URL Section */
    #url-section { display: flex; flex-direction: column; gap: 0.4rem; }
    .url-lbl { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; }
    .url-row { display: flex; gap: 0.35rem; }
    #url-input, #fab-url-input {
      flex: 1; min-width: 0; background: var(--surface-alt); border: 1px solid var(--border);
      border-radius: var(--r); padding: 0.3rem 0.5rem; font-size: 0.78rem; outline: none;
      transition: border-color 0.15s;
    }
    #url-input:focus, #fab-url-input:focus { border-color: var(--accent); }
    #url-input::placeholder, #fab-url-input::placeholder { color: var(--text-muted); }
    #url-progress { display: none; flex-direction: column; gap: 0.3rem; font-size: 0.72rem; color: var(--text-muted); }

    /* Buttons */
    .btn {
      display: inline-flex; align-items: center; gap: 0.3rem;
      border: 1px solid var(--border); border-radius: var(--r);
      padding: 0.3rem 0.65rem; font-size: 0.78rem; font-weight: 500;
      cursor: pointer; background: var(--surface-alt);
      transition: background 0.1s, border-color 0.1s; white-space: nowrap; flex-shrink: 0;
    }
    .btn:hover { background: var(--border-sub); }
    .btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
    .btn-acc { background: var(--accent); border-color: var(--accent); color: #fff; }
    .btn-acc:hover { background: var(--accent-hov); border-color: var(--accent-hov); }
    [data-theme="dark"] .btn-acc { color: #0f0f0f; }

    /* Sidebar Footer */
    #sidebar-footer {
      margin-top: auto; padding-top: 0.9rem; border-top: 1px solid var(--border);
      display: flex; flex-direction: column; gap: 0.4rem;
    }
    #storage-lbl { font-size: 0.7rem; color: var(--text-muted); }
    #storage-bar { height: 4px; border-radius: 999px; background: var(--border); overflow: hidden; }
    #storage-fill {
      height: 100%; border-radius: 999px; background: var(--accent); width: 0%;
      transition: width 0.4s ease, background 0.4s ease;
    }

    /* Content */
    #content { flex: 1; min-width: 0; display: flex; flex-direction: column; }
    #files-area { flex: 1; padding: 1.1rem; }

    /* Grid View */
    #files-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(165px, 1fr)); gap: 0.65rem; }
    .fc {
      border: 1px solid var(--border); border-radius: var(--r); background: var(--surface);
      padding: 0.8rem; display: flex; flex-direction: column; gap: 0.55rem;
      animation: fup 0.15s ease both; transition: border-color 0.15s;
    }
    .fc:hover { border-color: var(--accent); }
    .fc-ico {
      width: 34px; height: 34px; display: flex; align-items: center; justify-content: center;
      color: var(--text-muted); background: var(--surface-alt); border-radius: 4px;
      cursor: pointer; flex-shrink: 0;
    }
    .fc-name { font-size: 0.8rem; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; cursor: pointer; }
    .fc-meta { font-size: 0.7rem; color: var(--text-muted); }
    .fc-acts { display: flex; gap: 0.15rem; margin-top: auto; }
    .fc-acts .ib { width: 26px; height: 26px; }

    /* List View */
    #files-list { display: flex; flex-direction: column; }
    .fr {
      display: grid; grid-template-columns: 24px 1fr 70px 88px 76px;
      align-items: center; gap: 0.5rem; padding: 0.4rem 0.4rem;
      border-bottom: 1px solid var(--border-sub); border-radius: var(--r);
      animation: fup 0.15s ease both; transition: background 0.1s;
    }
    .fr:last-child { border-bottom: none; }
    .fr:hover { background: var(--surface-alt); }
    .fr-ico { width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; color: var(--text-muted); flex-shrink: 0; }
    .fr-name { font-size: 0.8rem; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; cursor: pointer; min-width: 0; }
    .fr-name:hover { color: var(--accent); }
    .fr-size { font-size: 0.75rem; color: var(--text-muted); text-align: right; font-variant-numeric: tabular-nums; white-space: nowrap; }
    .fr-date { font-size: 0.75rem; color: var(--text-muted); white-space: nowrap; }
    .fr-acts { display: flex; gap: 0.1rem; justify-content: flex-end; }
    .fr-acts .ib { width: 24px; height: 24px; }

    /* Empty State */
    #empty-state {
      display: none; flex-direction: column; align-items: center;
      gap: 0.65rem; padding: 3rem 1rem; text-align: center; color: var(--text-muted);
    }
    #empty-state svg { opacity: 0.35; }
    #empty-state p { font-size: 0.82rem; }

    /* Delete confirm */
    .btn-del.conf {
      font-size: 0.7rem; width: auto; padding: 0 0.45rem;
      background: var(--danger-soft); color: var(--danger);
      border-radius: var(--r); border: 1px solid transparent; white-space: nowrap;
    }

    /* FAB */
    #fab {
      position: fixed; right: 1.1rem; bottom: 1.1rem;
      width: 46px; height: 46px; border-radius: 50%;
      background: var(--accent); border: none; cursor: pointer;
      display: none; align-items: center; justify-content: center;
      box-shadow: 0 4px 16px rgba(0,0,0,0.25); z-index: 200;
      transition: background 0.15s; color: #fff;
    }
    [data-theme="dark"] #fab { color: #0f0f0f; }
    #fab:hover { background: var(--accent-hov); }

    /* Bottom Sheet */
    #sheet-ov {
      position: fixed; inset: 0; background: rgba(0,0,0,0.45);
      z-index: 300; display: none; opacity: 0; transition: opacity 0.2s;
    }
    #sheet-ov.vis { display: block; opacity: 1; }
    #bottom-sheet {
      position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface);
      border-top: 1px solid var(--border); border-radius: 12px 12px 0 0;
      padding: 1.1rem; z-index: 400; display: none; flex-direction: column; gap: 0.7rem;
      transform: translateY(100%); transition: transform 0.25s ease;
    }
    #bottom-sheet.vis { display: flex; transform: translateY(0); }
    #bs-handle { width: 32px; height: 4px; background: var(--border); border-radius: 999px; margin: 0 auto -0.1rem; }
    #bottom-sheet h3 { font-size: 0.82rem; font-weight: 600; }
    #bs-row { display: flex; gap: 0.45rem; }
    #fab-url-input { padding: 0.4rem 0.55rem; font-size: 0.82rem; }

    /* Toasts */
    #toasts {
      position: fixed; top: calc(var(--topbar-h) + 0.65rem); right: 0.9rem;
      z-index: 500; display: flex; flex-direction: column; gap: 0.35rem; pointer-events: none;
    }
    .toast {
      background: var(--surface); border: 1px solid var(--border);
      border-left: 3px solid var(--accent); border-radius: var(--r);
      padding: 0.5rem 0.8rem; font-size: 0.78rem; max-width: 260px;
      animation: tin 0.18s ease both; pointer-events: all;
      box-shadow: 0 4px 14px rgba(0,0,0,0.12);
    }
    .toast.ok  { border-left-color: var(--success); }
    .toast.err { border-left-color: var(--danger); }
    @keyframes tin { from { transform: translateX(10px); opacity: 0; } }
    @keyframes fup { from { transform: translateY(4px); opacity: 0; } }

    /* Responsive */
    @media (min-width: 1024px) {
      #topbar-brand { display: none; }
      #sidebar-brand { display: block; }
    }
    @media (max-width: 1023px) {
      #app-layout { flex-direction: column; }
      #sidebar { width: 100%; position: static; height: auto; border-right: none; border-bottom: 1px solid var(--border); overflow: visible; }
      #sidebar-brand { display: none; }
      #topbar-brand { display: block; }
      #fab { display: flex; }
      #files-area { padding: 0.75rem; }
      .fr { grid-template-columns: 22px 1fr 60px 76px; }
      .fr-size { display: none; }
    }
    @media (max-width: 480px) {
      #files-grid { grid-template-columns: repeat(2, 1fr); }
      #search-wrap { flex: 1; }
      .fr { grid-template-columns: 22px 1fr 70px; }
      .fr-date { display: none; }
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
    }
  </style>
</head>
<body>

  <header id="topbar">
    <span id="topbar-brand" aria-hidden="true">COPY</span>
    <div id="search-wrap" role="search">
      <span class="si" aria-hidden="true">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
      </span>
      <input type="search" id="search-input" placeholder="Suchen..." aria-label="Dateien suchen" autocomplete="off" spellcheck="false" />
      <button type="button" id="search-clear" aria-label="Suche loeschen">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M18 6 6 18M6 6l12 12"/>
        </svg>
      </button>
    </div>
    <div id="topbar-tools">
      <button type="button" class="ib on" id="btn-grid" data-view="grid" aria-label="Rasteransicht" aria-pressed="true">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
        </svg>
      </button>
      <button type="button" class="ib" id="btn-list" data-view="list" aria-label="Listenansicht" aria-pressed="false">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/>
        </svg>
      </button>
      <span class="vsep" aria-hidden="true"></span>
      <button type="button" class="ib" id="theme-btn" aria-label="Erscheinungsbild wechseln">
        <svg id="i-sun" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="4"/>
          <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/>
        </svg>
        <svg id="i-moon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
    </div>
  </header>

  <div id="app-layout">
    <aside id="sidebar">
      <div id="sidebar-inner">
        <div id="sidebar-brand">COPY</div>

        <div id="drop-zone" role="button" tabindex="0" aria-label="Dateien hochladen">
          <div class="dz-ic" aria-hidden="true">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="17 8 12 3 7 8"/>
              <line x1="12" y1="3" x2="12" y2="15"/>
            </svg>
          </div>
          <p class="dz-t">Hochladen oder hierher ziehen</p>
          <p class="dz-s">Klicken zum Auswaehlen</p>
        </div>
        <input type="file" id="file-input" multiple hidden />

        <div id="progress-container" role="status" aria-live="polite"></div>

        <div id="upload-warning" role="alert" aria-live="assertive">
          Upload laeuft - Seite nicht verlassen.
        </div>

        <div id="url-section">
          <span class="url-lbl">Von URL laden</span>
          <div class="url-row">
            <input type="url" id="url-input" placeholder="https://..." aria-label="Datei-URL" />
            <button type="button" class="btn btn-acc" id="url-btn">Laden</button>
          </div>
          <div id="url-progress" hidden>
            <span>Wird heruntergeladen...</span>
            <div class="pb pb--ind"><div class="pb-f"></div></div>
          </div>
        </div>

        <div id="sidebar-footer">
          <span id="storage-lbl">Speicher wird geladen...</span>
          <div id="storage-bar" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
            <div id="storage-fill"></div>
          </div>
        </div>
      </div>
    </aside>

    <main id="content">
      <div id="files-area">
        <div id="files-grid"></div>
        <div id="files-list" style="display:none"></div>
        <div id="empty-state" role="status">
          <svg width="38" height="38" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
            <path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/>
            <polyline points="13 2 13 9 20 9"/>
          </svg>
          <p id="empty-txt">Noch keine Dateien.</p>
        </div>
      </div>
    </main>
  </div>

  <button type="button" id="fab" aria-label="Von URL herunterladen" aria-expanded="false">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
      <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
    </svg>
  </button>

  <div id="sheet-ov" aria-hidden="true"></div>
  <div id="bottom-sheet" role="dialog" aria-modal="true" aria-label="Von URL laden">
    <div id="bs-handle" aria-hidden="true"></div>
    <h3>Von URL laden</h3>
    <div id="bs-row">
      <input type="url" id="fab-url-input" placeholder="https://..." aria-label="Datei-URL" />
      <button type="button" class="btn btn-acc" id="fab-url-btn">Laden</button>
    </div>
  </div>

  <div id="toasts" aria-live="polite" aria-atomic="false"></div>

  <script>
    // All user-supplied data is HTML-escaped via esc() before being set as
    // attribute values or text content. SVG icon strings are static literals.
    const dropZone    = document.getElementById('drop-zone');
    const fileInput   = document.getElementById('file-input');
    const progCont    = document.getElementById('progress-container');
    const upWarn      = document.getElementById('upload-warning');
    const urlInput    = document.getElementById('url-input');
    const urlBtn      = document.getElementById('url-btn');
    const urlProg     = document.getElementById('url-progress');
    const storageLbl  = document.getElementById('storage-lbl');
    const storageFill = document.getElementById('storage-fill');
    const storageBar  = document.getElementById('storage-bar');
    const filesGrid   = document.getElementById('files-grid');
    const filesList   = document.getElementById('files-list');
    const emptyState  = document.getElementById('empty-state');
    const emptyTxt    = document.getElementById('empty-txt');
    const searchInput = document.getElementById('search-input');
    const searchClear = document.getElementById('search-clear');
    const btnGrid     = document.getElementById('btn-grid');
    const btnList     = document.getElementById('btn-list');
    const themeBtn    = document.getElementById('theme-btn');
    const iSun        = document.getElementById('i-sun');
    const iMoon       = document.getElementById('i-moon');
    const fab         = document.getElementById('fab');
    const sheetOv     = document.getElementById('sheet-ov');
    const bottomSheet = document.getElementById('bottom-sheet');
    const fabUrlInput = document.getElementById('fab-url-input');
    const fabUrlBtn   = document.getElementById('fab-url-btn');
    const toastsEl    = document.getElementById('toasts');

    let currentFiles = [];
    let currentView  = localStorage.getItem('copy-view') || 'grid';
    let searchQuery  = '';
    let usedBytes    = 0;
    let freeBytes    = null;
    const activeUps  = new Map();

    // Static SVG icon strings (not user content)
    const I = {
      doc: '<svg width="WW" height="WW" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>',
      tbl: '<svg width="WW" height="WW" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M3 15h18M9 3v18"/></svg>',
      zip: '<svg width="WW" height="WW" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="21 8 21 21 3 21 3 8"/><rect x="1" y="3" width="22" height="5" rx="1"/><line x1="10" y1="12" x2="14" y2="12"/></svg>',
      img: '<svg width="WW" height="WW" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>',
      vid: '<svg width="WW" height="WW" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>',
      aud: '<svg width="WW" height="WW" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>',
      app: '<svg width="WW" height="WW" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>',
      dsk: '<svg width="WW" height="WW" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/></svg>',
      txt: '<svg width="WW" height="WW" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><line x1="12" y1="9" x2="8" y2="9"/></svg>',
      def: '<svg width="WW" height="WW" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><polyline points="13 2 13 9 20 9"/></svg>',
      lnk: '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>',
      chk: '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>',
      dl:  '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>',
      del: '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6M9 6V4h6v2"/></svg>',
    };

    const EXT = {
      pdf:'doc',doc:'doc',docx:'doc',odt:'doc',
      xls:'tbl',xlsx:'tbl',csv:'tbl',ods:'tbl',
      ppt:'doc',pptx:'doc',
      zip:'zip',rar:'zip','7z':'zip',gz:'zip',tar:'zip',bz2:'zip',xz:'zip',zst:'zip',
      png:'img',jpg:'img',jpeg:'img',gif:'img',webp:'img',svg:'img',bmp:'img',avif:'img',heic:'img',
      mp4:'vid',mkv:'vid',avi:'vid',mov:'vid',webm:'vid',m4v:'vid',wmv:'vid',
      mp3:'aud',wav:'aud',flac:'aud',ogg:'aud',m4a:'aud',aac:'aud',opus:'aud',
      exe:'app',msi:'app',deb:'app',rpm:'app',pkg:'app',
      iso:'dsk',img:'dsk',dmg:'dsk',
      txt:'txt',log:'txt',md:'txt',json:'txt',xml:'txt',yaml:'txt',yml:'txt',ini:'txt',conf:'txt',sh:'txt',
    };

    function getIcon(name, sz) {
      const ext = (name.split('.').pop() || '').toLowerCase();
      return (I[EXT[ext] || 'def']).replace(/WW/g, String(sz));
    }

    function toast(msg, type) {
      const el = document.createElement('div');
      el.className = 'toast' + (type === 'success' ? ' ok' : type === 'error' ? ' err' : '');
      el.textContent = msg;
      toastsEl.appendChild(el);
      setTimeout(() => {
        el.style.transition = 'opacity 0.25s, transform 0.25s';
        el.style.opacity = '0'; el.style.transform = 'translateX(10px)';
        setTimeout(() => el.remove(), 260);
      }, 3000);
    }

    function applyTheme(dark) {
      if (dark) {
        document.documentElement.setAttribute('data-theme', 'dark');
        iSun.style.display = 'block'; iMoon.style.display = 'none';
      } else {
        document.documentElement.removeAttribute('data-theme');
        iSun.style.display = 'none'; iMoon.style.display = 'block';
      }
    }
    const st = localStorage.getItem('copy-theme');
    applyTheme(st === 'dark' || (!st && window.matchMedia('(prefers-color-scheme: dark)').matches));
    themeBtn.addEventListener('click', () => {
      const d = document.documentElement.hasAttribute('data-theme');
      applyTheme(!d);
      localStorage.setItem('copy-theme', d ? 'light' : 'dark');
    });

    function setView(v) {
      currentView = v;
      localStorage.setItem('copy-view', v);
      btnGrid.classList.toggle('on', v === 'grid');
      btnList.classList.toggle('on', v === 'list');
      btnGrid.setAttribute('aria-pressed', String(v === 'grid'));
      btnList.setAttribute('aria-pressed', String(v === 'list'));
      renderFiles();
    }
    setView(currentView);
    btnGrid.addEventListener('click', () => setView('grid'));
    btnList.addEventListener('click', () => setView('list'));

    const buHandler = e => { e.preventDefault(); e.returnValue = ''; };
    function syncWarn() {
      const a = activeUps.size > 0;
      upWarn.style.display = a ? 'block' : 'none';
      if (a) window.addEventListener('beforeunload', buHandler);
      else   window.removeEventListener('beforeunload', buHandler);
    }

    function fmtBytes(n) {
      if (!Number.isFinite(n) || n < 0) return '-';
      const u = ['B','KB','MB','GB','TB']; let i = 0;
      while (n >= 1024 && i < u.length - 1) { n /= 1024; i++; }
      return (n >= 10 || i === 0 ? n.toFixed(0) : n.toFixed(1)) + ' ' + u[i];
    }
    function fmtDate(s) {
      try { return new Date(s).toLocaleDateString('de-DE', {day:'2-digit',month:'2-digit',year:'2-digit'}); }
      catch(_) { return s || ''; }
    }
    // Escape user data before use in HTML attributes or text nodes
    function esc(s) {
      return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function updateStorage() {
      const total = freeBytes != null ? freeBytes + usedBytes : null;
      if (total) {
        storageLbl.textContent = fmtBytes(usedBytes) + ' / ' + fmtBytes(total) + '  \u00b7  ' + fmtBytes(freeBytes) + ' frei';
        const pct = Math.min(100, usedBytes / total * 100);
        storageFill.style.width = pct + '%';
        storageFill.style.background = pct > 80 ? 'var(--danger)' : 'var(--accent)';
        storageBar.setAttribute('aria-valuenow', pct.toFixed(1));
        storageBar.setAttribute('aria-label', 'Speicher ' + pct.toFixed(0) + '% belegt');
      } else {
        storageLbl.textContent = fmtBytes(usedBytes) + ' belegt';
      }
    }
    async function loadStorage() {
      try {
        const r = await fetch('/api/storage');
        if (!r.ok) return;
        const d = await r.json();
        freeBytes = Number.isFinite(d.free) ? d.free : null;
        updateStorage();
      } catch(_) {}
    }

    function renderFiles() {
      filesGrid.innerHTML = ''; filesList.innerHTML = '';
      let files = currentFiles;
      if (searchQuery) {
        const q = searchQuery.toLowerCase();
        files = files.filter(f => f.name.toLowerCase().includes(q));
      }
      const none = files.length === 0;
      emptyState.style.display = none ? 'flex' : 'none';
      filesGrid.style.display  = (!none && currentView === 'grid') ? 'grid' : 'none';
      filesList.style.display  = (!none && currentView === 'list') ? 'flex'  : 'none';
      if (none) { emptyTxt.textContent = searchQuery ? 'Keine Treffer.' : 'Noch keine Dateien.'; return; }

      [...files]
        .sort((a,b) => a.name.localeCompare(b.name, 'de', {sensitivity:'base', numeric:true}))
        .forEach((f, i) => {
          const delay = (i * 22) + 'ms';
          (currentView === 'grid' ? filesGrid : filesList)
            .appendChild(currentView === 'grid' ? mkCard(f, delay) : mkRow(f, delay));
        });
    }

    function mkCard(f, delay) {
      const art = document.createElement('article');
      art.className = 'fc'; art.style.animationDelay = delay;

      const ico = document.createElement('div');
      ico.className = 'fc-ico'; ico.dataset.dl = f.name; ico.title = 'Herunterladen';
      ico.innerHTML = getIcon(f.name, 20); // static SVG only

      const name = document.createElement('div');
      name.className = 'fc-name'; name.dataset.dl = f.name; name.title = f.name;
      name.textContent = f.name;

      const meta = document.createElement('div');
      meta.className = 'fc-meta';
      meta.textContent = f.size_formatted + ' \u00b7 ' + fmtDate(f.modified);

      const acts = document.createElement('div');
      acts.className = 'fc-acts';

      if (f.short_link) {
        const cpBtn = document.createElement('button');
        cpBtn.type = 'button'; cpBtn.className = 'ib btn-cp';
        cpBtn.dataset.cp = f.short_link;
        cpBtn.setAttribute('aria-label', 'Kurzlink kopieren');
        cpBtn.title = 'Kurzlink kopieren';
        const cpIco = document.createElement('span'); cpIco.className = 'bi';
        cpIco.innerHTML = I.lnk; // static SVG
        cpBtn.appendChild(cpIco); acts.appendChild(cpBtn);
      }

      const dlBtn = document.createElement('button');
      dlBtn.type = 'button'; dlBtn.className = 'ib'; dlBtn.dataset.dl = f.name;
      dlBtn.setAttribute('aria-label', 'Herunterladen'); dlBtn.title = 'Herunterladen';
      const dlIco = document.createElement('span'); dlIco.className = 'bi';
      dlIco.innerHTML = I.dl; // static SVG
      dlBtn.appendChild(dlIco); acts.appendChild(dlBtn);

      const delBtn = document.createElement('button');
      delBtn.type = 'button'; delBtn.className = 'ib btn-del'; delBtn.dataset.name = f.name;
      delBtn.setAttribute('aria-label', 'Loeschen'); delBtn.title = 'Loeschen';
      const delIco = document.createElement('span'); delIco.className = 'bi';
      delIco.innerHTML = I.del; // static SVG
      delBtn.appendChild(delIco); acts.appendChild(delBtn);

      art.appendChild(ico); art.appendChild(name); art.appendChild(meta); art.appendChild(acts);
      return art;
    }

    function mkRow(f, delay) {
      const row = document.createElement('div');
      row.className = 'fr'; row.style.animationDelay = delay;

      const ico = document.createElement('div'); ico.className = 'fr-ico';
      ico.setAttribute('aria-hidden', 'true'); ico.innerHTML = getIcon(f.name, 16); // static SVG

      const name = document.createElement('div');
      name.className = 'fr-name'; name.dataset.dl = f.name; name.title = f.name;
      name.textContent = f.name;

      const size = document.createElement('div'); size.className = 'fr-size';
      size.textContent = f.size_formatted;

      const date = document.createElement('div'); date.className = 'fr-date';
      date.textContent = fmtDate(f.modified);

      const acts = document.createElement('div'); acts.className = 'fr-acts';

      if (f.short_link) {
        const cpBtn = document.createElement('button');
        cpBtn.type = 'button'; cpBtn.className = 'ib btn-cp'; cpBtn.dataset.cp = f.short_link;
        cpBtn.setAttribute('aria-label', 'Kurzlink kopieren'); cpBtn.title = 'Kurzlink kopieren';
        const cpIco = document.createElement('span'); cpIco.className = 'bi';
        cpIco.innerHTML = I.lnk; cpBtn.appendChild(cpIco); acts.appendChild(cpBtn);
      }

      const dlBtn = document.createElement('button');
      dlBtn.type = 'button'; dlBtn.className = 'ib'; dlBtn.dataset.dl = f.name;
      dlBtn.setAttribute('aria-label', 'Herunterladen'); dlBtn.title = 'Herunterladen';
      const dlIco = document.createElement('span'); dlIco.className = 'bi';
      dlIco.innerHTML = I.dl; dlBtn.appendChild(dlIco); acts.appendChild(dlBtn);

      const delBtn = document.createElement('button');
      delBtn.type = 'button'; delBtn.className = 'ib btn-del'; delBtn.dataset.name = f.name;
      delBtn.setAttribute('aria-label', 'Loeschen'); delBtn.title = 'Loeschen';
      const delIco = document.createElement('span'); delIco.className = 'bi';
      delIco.innerHTML = I.del; delBtn.appendChild(delIco); acts.appendChild(delBtn);

      row.appendChild(ico); row.appendChild(name); row.appendChild(size);
      row.appendChild(date); row.appendChild(acts);
      return row;
    }

    async function loadFiles() {
      try {
        const r = await fetch('/api/files');
        if (!r.ok) throw new Error('Laden fehlgeschlagen');
        currentFiles = await r.json();
        usedBytes = currentFiles.reduce((s,f) => s + (f.size||0), 0);
        renderFiles(); updateStorage();
      } catch(e) { toast(e.message, 'error'); }
    }

    function uploadFiles(files) {
      if (!files || !files.length) return;
      Array.from(files).forEach(file => {
        const fd = new FormData(); fd.append('file', file);
        const xhr = new XMLHttpRequest(); xhr.open('POST', '/api/upload', true);
        const id = file.name + '-' + Date.now() + '-' + Math.random();

        const item = document.createElement('div'); item.className = 'pi';

        const row = document.createElement('div'); row.className = 'pi-row';
        const lbl = document.createElement('span'); lbl.className = 'pi-name';
        lbl.textContent = file.name;
        const cancelBtn = document.createElement('button');
        cancelBtn.type = 'button'; cancelBtn.className = 'ib';
        cancelBtn.setAttribute('aria-label', 'Abbrechen');
        cancelBtn.style.cssText = 'width:20px;height:20px';
        cancelBtn.innerHTML = '<svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6 6 18M6 6l12 12"/></svg>';
        row.appendChild(lbl); row.appendChild(cancelBtn);

        const pb = document.createElement('div'); pb.className = 'pb';
        const pbf = document.createElement('div'); pbf.className = 'pb-f'; pbf.style.width = '0%';
        pb.appendChild(pbf);
        item.appendChild(row); item.appendChild(pb);

        progCont.appendChild(item);
        activeUps.set(id, {element:item, xhr});
        syncWarn(); progCont.style.display = 'flex';

        cancelBtn.addEventListener('click', () => { cancelBtn.disabled = true; xhr.abort(); });

        xhr.upload.addEventListener('progress', e => {
          if (e.lengthComputable) {
            const p = Math.round(e.loaded / e.total * 100);
            pbf.style.width = p + '%';
            lbl.textContent = file.name + ' - ' + p + '%';
          }
        });

        const done = cb => {
          cancelBtn.disabled = true; activeUps.delete(id); item.remove(); syncWarn(); cb();
          if (activeUps.size === 0) {
            setTimeout(() => { progCont.style.display = 'none'; progCont.innerHTML = ''; }, 300);
            fileInput.value = '';
          }
        };
        xhr.addEventListener('load', () => done(() => {
          if (xhr.status === 200) { loadFiles(); loadStorage(); toast(file.name + ' hochgeladen', 'success'); }
          else toast('Upload fehlgeschlagen', 'error');
        }));
        xhr.addEventListener('error', () => done(() => toast('Upload fehlgeschlagen', 'error')));
        xhr.addEventListener('abort', () => done(() => toast('Upload abgebrochen', 'info')));
        xhr.send(fd);
      });
    }

    function dlFile(name) { window.location.href = '/download/' + encodeURIComponent(name); }

    async function delFile(name, btn) {
      try {
        const r = await fetch('/api/files/' + encodeURIComponent(name), {method:'DELETE'});
        if (r.ok) { loadFiles(); loadStorage(); toast(name + ' geloescht', 'success'); }
        else toast('Fehler beim Loeschen', 'error');
      } catch(_) { toast('Fehler beim Loeschen', 'error'); }
      if (btn) {
        btn.classList.remove('conf');
        const ico = btn.querySelector('.bi');
        if (ico) ico.innerHTML = I.del;
      }
    }

    async function dlFromUrl(input) {
      const url = (input && input.value || '').trim();
      if (!url) { toast('Bitte eine URL eingeben', 'info'); return; }
      urlProg.style.display = "flex"; if (urlBtn) urlBtn.disabled = true;
      try {
        const r = await fetch('/api/download-url', {
          method: 'POST', headers: {'Content-Type':'application/json'},
          body: JSON.stringify({url}),
        });
        const d = await r.json();
        if (!r.ok) throw new Error(d.error || 'Download fehlgeschlagen');
        if (input) input.value = '';
        loadFiles(); loadStorage();
        toast(d.message || 'Datei heruntergeladen', 'success');
      } catch(e) { toast(e.message, 'error'); }
      finally { urlProg.style.display = "none"; if (urlBtn) urlBtn.disabled = false; }
    }

    function onFileAction(e) {
      const cp = e.target.closest('.btn-cp[data-cp]');
      if (cp) {
        navigator.clipboard.writeText(cp.dataset.cp).then(() => {
          const ic = cp.querySelector('.bi');
          if (ic) { ic.innerHTML = I.chk; setTimeout(() => { ic.innerHTML = I.lnk; }, 800); }
          toast('Kurzlink kopiert', 'success');
        }).catch(() => toast('Kopieren fehlgeschlagen', 'error'));
        return;
      }
      const dl = e.target.closest('[data-dl]');
      if (dl) { dlFile(dl.dataset.dl); return; }
      const del = e.target.closest('.btn-del[data-name]');
      if (del) {
        if (del.classList.contains('conf')) {
          clearTimeout(del._ct);
          delFile(del.dataset.name, del);
        } else {
          del.classList.add('conf');
          del.textContent = 'Sicher?';
          del._ct = setTimeout(() => {
            del.classList.remove('conf');
            const ico = del.querySelector('.bi') || document.createElement('span');
            if (!del.querySelector('.bi')) { ico.className = 'bi'; del.appendChild(ico); }
            ico.innerHTML = I.del;
            del.textContent = '';
            del.appendChild(ico);
          }, 3000);
        }
        return;
      }
    }
    filesGrid.addEventListener('click', onFileAction);
    filesList.addEventListener('click', onFileAction);

    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', e => {
      e.preventDefault(); dropZone.classList.remove('dragover'); uploadFiles(e.dataTransfer.files);
    });
    dropZone.addEventListener('click', () => fileInput.click());
    dropZone.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); fileInput.click(); }
    });
    fileInput.addEventListener('change', e => uploadFiles(e.target.files));

    urlBtn.addEventListener('click', () => dlFromUrl(urlInput));
    urlInput.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); dlFromUrl(urlInput); }});

    searchInput.addEventListener('input', e => {
      searchQuery = e.target.value;
      searchClear.classList.toggle('vis', searchQuery.length > 0);
      renderFiles();
    });
    searchClear.addEventListener('click', () => {
      searchInput.value = ''; searchQuery = '';
      searchClear.classList.remove('vis'); renderFiles(); searchInput.focus();
    });

    function openSheet() {
      sheetOv.style.display = 'block';
      requestAnimationFrame(() => sheetOv.classList.add('vis'));
      bottomSheet.style.display = 'flex';
      requestAnimationFrame(() => bottomSheet.classList.add('vis'));
      fab.setAttribute('aria-expanded', 'true');
      setTimeout(() => fabUrlInput.focus(), 260);
    }
    function closeSheet() {
      sheetOv.classList.remove('vis'); bottomSheet.classList.remove('vis');
      fab.setAttribute('aria-expanded', 'false');
      setTimeout(() => { sheetOv.style.display = 'none'; bottomSheet.style.display = 'none'; }, 260);
    }
    fab.addEventListener('click', openSheet);
    sheetOv.addEventListener('click', closeSheet);
    fabUrlBtn.addEventListener('click', () => { dlFromUrl(fabUrlInput); closeSheet(); });
    fabUrlInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); dlFromUrl(fabUrlInput); closeSheet(); }
      if (e.key === 'Escape') closeSheet();
    });

    window.addEventListener('load', () => {
      loadFiles(); loadStorage();
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js')
          .catch(err => console.error('Service Worker Fehler:', err));
      }
    });
  </script>
</body>
</html>
